# 기본값은 emptyDir 캐시이며, 필요하면 환경별 pod template에서 PVC로 교체합니다.
apiVersion: v1
kind: Pod
spec:
  dnsConfig:
    options:
    - name: ndots
      value: "1"
  nodeSelector:
    kubernetes.io/hostname: worker-1
  containers:
  - name: node
    image: ${HARBOR_URL}/base/node:20-alpine
    command: ['sleep']
    args: ['infinity']
    env:
    - name: YARN_CACHE_FOLDER
      value: /home/jenkins/.cache/yarn
    - name: NEXT_TELEMETRY_DISABLED
      value: "1"
    volumeMounts:
    - name: yarn-cache
      mountPath: /home/jenkins/.cache/yarn
  - name: kaniko
    image: gcr.io/kaniko-project/executor:debug
    command: ['sleep']
    args: ['infinity']
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
    volumeMounts:
    - name: harbor-creds
      mountPath: /kaniko/.docker
  - name: git
    image: ${HARBOR_URL}/base/alpine-git:2.43.0
    command: ['sleep']
    args: ['infinity']
  - name: jnlp
    image: ${HARBOR_URL}/base/inbound-agent:3355.v388858a_47b_33-16
  volumes:
  - name: harbor-creds
    secret:
      secretName: harbor-registry-secret
      items:
      - key: .dockerconfigjson
        path: config.json
  - name: yarn-cache
    emptyDir: {}