<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오프라인 - 오카운트</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 1rem;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: #FFD700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .retry-btn {
            background: #FFD700;
            color: #333;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            background: #FFA500;
            transform: translateY(-2px);
        }

        .features {
            margin-top: 2rem;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .feature-icon {
            width: 20px;
            height: 20px;
            background: #FFD700;
            border-radius: 50%;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            🥚
        </div>

        <h1>오프라인 상태입니다</h1>

        <p>
            인터넷 연결을 확인해 주세요.<br>
            네트워크가 복구되면 자동으로 연결됩니다.
        </p>

        <button class="retry-btn" onclick="location.reload()">
            다시 시도
        </button>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📱</div>
                PWA로 설치하면 더 빠르게 접근할 수 있어요
            </div>
            <div class="feature-item">
                <div class="feature-icon">💾</div>
                일부 데이터는 오프라인에서도 확인 가능해요
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔄</div>
                네트워크 복구시 자동으로 동기화됩니다
            </div>
        </div>
    </div>

    <script>
        // 온라인 상태 복구 감지
        window.addEventListener('online', () => {
            console.log('네트워크 복구됨');
            location.reload();
        });

        // 주기적 재연결 시도
        let retryCount = 0;
        const maxRetries = 5;

        function autoRetry() {
            if (retryCount < maxRetries && !navigator.onLine) {
                retryCount++;
                console.log(`자동 재시도 ${retryCount}/${maxRetries}`);

                fetch('/')
                    .then(() => {
                        location.reload();
                    })
                    .catch(() => {
                        setTimeout(autoRetry, 3000 * retryCount);
                    });
            }
        }

        // 5초 후 첫 번째 자동 재시도
        setTimeout(autoRetry, 5000);
    </script>
</body>
</html>
